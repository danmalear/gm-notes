app = 'gm-notes-client'
primary_region = 'sjc'

[env]
  NODE_ENV = "preview"
  APP_PORT = 5173

[http_service]
  internal_port = 5173
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
