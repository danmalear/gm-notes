# fly.toml app configuration file generated for gm-notes-server on 2026-04-01T17:54:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gm-notes-server'
primary_region = 'sjc'

[build]

[env]
  NODE_ENV=preview
  APP_PORT=3000

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[deploy]
  release_command = "knex migrate:latest"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
